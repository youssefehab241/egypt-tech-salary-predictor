name: Keep Streamlit Awake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          curl -L --max-time 60 --retry 3 --retry-delay 5 \
            -A "Mozilla/5.0" \
            -o /dev/null \
            -s \
            -w "HTTP Status: %{http_code}\n" \
            "https://egypt-tech-salary-predictor-rwrrucbh4lypdqitofhabm.streamlit.app/"